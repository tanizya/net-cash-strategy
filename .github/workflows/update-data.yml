name: Update Market Data

on:
  schedule:
    - cron: '0 8 * * 1-5'  # Weekdays 8:00 UTC = 17:00 JST (after market close)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance numpy anthropic

      - name: Fetch data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/index.html
          git diff --staged --quiet || git commit -m "Update market data $(date -u +%Y-%m-%d)"
          git push
